<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef1fe"/>
      <stop offset="100%" stop-color="#e4e8fa"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5D6FE9"/>
      <stop offset="100%" stop-color="#3B4DC8"/>
    </linearGradient>
    <!-- Indigo glow blobs -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4C5FD5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4C5FD5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#27AE60" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#27AE60" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <ellipse cx="1080" cy="-60" rx="420" ry="420" fill="url(#blob1)"/>
  <ellipse cx="120" cy="700" rx="340" ry="340" fill="url(#blob2)"/>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="28" fill="white"
    style="filter: drop-shadow(0 8px 40px rgba(28,43,58,0.10))"/>

  <!-- S-mark logo -->
  <g transform="translate(120, 160)">
    <rect width="100" height="100" rx="26" fill="url(#mark)"/>
    <path d="M42 20C59 17 75 23 75 37C75 51 59 55 42 52L42 20Z" fill="white"/>
    <path d="M58 48C41 45 25 48 25 62C25 77 41 83 58 80L58 48Z" fill="white"/>
    <rect x="42" y="46" width="16" height="8" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="244" y="218" font-family="'Inter', -apple-system, Arial, sans-serif"
    font-weight="800" font-size="64" letter-spacing="-2" fill="#1C2B3A">
    Spendable
  </text>

  <!-- Divider -->
  <rect x="120" y="300" width="960" height="2" rx="1" fill="#E8E8E3"/>

  <!-- Tagline -->
  <text x="120" y="370" font-family="'Inter', -apple-system, Arial, sans-serif"
    font-weight="600" font-size="36" fill="#5a6a7a">
    Financial clarity for freelancers.
  </text>

  <!-- Subtitle -->
  <text x="120" y="424" font-family="'Inter', -apple-system, Arial, sans-serif"
    font-weight="400" font-size="28" fill="#8a9aaa">
    Know exactly how much you can safely spend right now.
  </text>

  <!-- URL pill -->
  <rect x="120" y="464" width="280" height="46" rx="23" fill="#eef0fb"/>
  <text x="260" y="493" font-family="'Inter', -apple-system, Arial, sans-serif"
    font-weight="600" font-size="22" fill="#4C5FD5" text-anchor="middle">
    spendable.finance
  </text>
</svg>
